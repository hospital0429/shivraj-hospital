<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shivraj Hospital Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:'Segoe UI';background:#f0f6ff;}
.header{background:#0d6efd;color:white;padding:18px;text-align:center;font-size:26px;}

.container{padding:20px;}

.dateBox{text-align:center;margin:15px;}

input,button{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#0d6efd;
color:white;
border:none;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card h3{color:#0d6efd;margin:0;}
.value{font-size:20px;font-weight:bold;margin-top:10px;}

.section{margin-top:30px;}

img{width:100%;border-radius:8px;margin-top:10px;}

.notice-card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.notice-actions{margin-top:10px;display:flex;gap:10px;}

.notice-btn{
padding:6px 10px;
border-radius:6px;
text-decoration:none;
font-size:14px;
}

.view{background:#0d6efd;color:white;}
.download{background:#28a745;color:white;}

</style>

</head>

<body>

<div class="header">Shivraj Hospital Dashboard</div>

<div class="container">

<!-- DATE -->
<div class="dateBox">
<input type="date" id="selectedDate">
<button onclick="loadData()">Search</button>
</div>

<div style="text-align:center;margin:10px;">
<button onclick="printReport()">🖨️ Print Report</button>
</div>

<h3 style="text-align:center;color:#0d6efd;" id="reportTitle"></h3>

<!-- DAILY -->
<div class="grid">

<div class="card"><h3>OPD</h3><div class="value" id="opd">0</div></div>
<div class="card"><h3>Emergency</h3><div class="value" id="er">0</div></div>
<div class="card"><h3>Lab</h3><div class="value" id="lab">0</div></div>
<div class="card"><h3>Pharmacy</h3><div class="value" id="pharmacy">0</div></div>
<div class="card"><h3>Delivery</h3><div class="value" id="delivery">0</div></div>
<div class="card"><h3>ANC</h3><div class="value" id="anc">0</div></div>

<div class="card"><h3>ECG</h3><div class="value" id="ecg">0</div></div>
<div class="card"><h3>USG</h3><div class="value" id="usg">0</div></div>
<div class="card"><h3>X-Ray</h3><div class="value" id="xray">0</div></div>

</div>

<!-- MONTHLY -->
<div class="section">
<h2>Monthly Report</h2>

<select id="monthSelect"></select>

<div class="grid">

<div class="card"><h3>OPD</h3><div id="m_opd">0</div></div>
<div class="card"><h3>ER</h3><div id="m_er">0</div></div>
<div class="card"><h3>Delivery</h3><div id="m_delivery">0</div></div>
<div class="card"><h3>ANC</h3><div id="m_anc">0</div></div>
<div class="card"><h3>Lab</h3><div id="m_lab">0</div></div>
<div class="card"><h3>Pharmacy</h3><div id="m_pharmacy">0</div></div>

<div class="card"><h3>ECG</h3><div id="m_ecg">0</div></div>
<div class="card"><h3>USG</h3><div id="m_usg">0</div></div>
<div class="card"><h3>X-Ray</h3><div id="m_xray">0</div></div>

</div>

<canvas id="chart"></canvas>
</div>

<!-- DOCTORS -->
<div class="section">
<h2>Doctors</h2>
<div class="grid" id="doctors"></div>
</div>

<!-- STAFF -->
<div class="section">
<h2>Staff</h2>
<div class="grid" id="staff"></div>
</div>

<!-- HEADS -->
<div class="section">
<h2>Department Heads</h2>
<div class="grid" id="heads"></div>
</div>

<!-- NOTICES -->
<div class="section">
<h2>Notices</h2>
<div id="notices"></div>
</div>

</div>

<script>

const sheetID="1ssepRWNPq9Jy7vnTGXNT0e6Msnn0CFWW2PACQaq3ojw";

let allData=[], monthlyData=[];

/* DAILY */
fetch(`https://opensheet.elk.sh/${sheetID}/DAILY DATA`)
.then(r=>r.json())
.then(d=>{
allData=d;
loadLatest();
});

selectedDate.value=new Date().toISOString().split('T')[0];

function loadLatest(){
let d=allData[allData.length-1];
showData(d);
reportTitle.innerText="Today: "+d.Date;
}

function loadData(){
let date=selectedDate.value;

let found=allData.find(d=>{
let dt=new Date(d.Date);
if(isNaN(dt)) return false;

let f=dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,'0')+"-"+String(dt.getDate()).padStart(2,'0');
return f===date;
});

if(found){
showData(found);
reportTitle.innerText="Date: "+date;
}else alert("No data found");
}

function showData(d){

opd.innerText=(+d["OPD Male"]||0)+(+d["OPD Female"]||0);

let r=+d["ER Red"]||0,y=+d["ER Yellow"]||0,g=+d["ER Green"]||0;
er.innerText=r+y+g;

lab.innerText=Number(d.Lab||0);
pharmacy.innerText=Number(d.Pharmacy||0);
delivery.innerText=Number(d.Delivery||0);
anc.innerText=Number(d.ANC||0);

ecg.innerText=Number(d.ECG||0);
usg.innerText=Number(d.USG||0);
xray.innerText=Number(d["X-Ray"]||0);
}

/* MONTHLY FIXED */
fetch(`https://opensheet.elk.sh/${sheetID}/MONTHLY DATA`)
.then(r=>r.json())
.then(d=>{

monthlyData=d;

monthSelect.innerHTML="";

d.forEach(x=>{
monthSelect.innerHTML+=`<option value="${x.Month}">${x.Month}</option>`;
});

loadMonth(d[d.length-1].Month);

new Chart(chart,{
type:'bar',
data:{
labels:d.map(x=>x.Month),
datasets:[{
label:'OPD',
data:d.map(x=>Number(x.OPD||0))
}]
}
});

});

function loadMonth(m){

let d=monthlyData.find(x=>x.Month===m);
if(!d) return;

m_opd.innerText=Number(d.OPD||0);
m_er.innerText=Number(d.ER||0);
m_delivery.innerText=Number(d.Delivery||0);
m_anc.innerText=Number(d.ANC||0);
m_lab.innerText=Number(d.Lab||0);
m_pharmacy.innerText=Number(d.Pharmacy||0);
m_ecg.innerText=Number(d.ECG||0);
m_usg.innerText=Number(d.USG||0);
m_xray.innerText=Number(d["X-Ray"]||0);
}

monthSelect.onchange=()=>loadMonth(monthSelect.value);

/* DOCTORS */
fetch(`https://opensheet.elk.sh/${sheetID}/DOCTORS`)
.then(r=>r.json())
.then(d=>{
doctors.innerHTML=d.map(x=>`
<div class="card">
<img src="${x.Photo}">
<h3>${x.Name}</h3>
<p>${x.Department}</p>
</div>`).join('');
});

/* STAFF */
fetch(`https://opensheet.elk.sh/${sheetID}/STAFF`)
.then(r=>r.json())
.then(d=>{
staff.innerHTML=d.map(x=>`
<div class="card">
<img src="${x.Photo}">
<h3>${x.Name}</h3>
<p>${x.Position}</p>
</div>`).join('');
});

/* HEADS */
fetch(`https://opensheet.elk.sh/${sheetID}/HEADS`)
.then(r=>r.json())
.then(d=>{
heads.innerHTML=d.map(x=>`
<div class="card">
<img src="${x.Photo}">
<h3>${x.Name}</h3>
<p>${x.Department}</p>
</div>`).join('');
});

/* NOTICES */
fetch(`https://opensheet.elk.sh/${sheetID}/NOTICES`)
.then(r=>r.json())
.then(d=>{

d.sort((a,b)=>new Date(b.Date)-new Date(a.Date));

notices.innerHTML=d.map(n=>`
<div class="notice-card">

<h3>${n.Title}</h3>
<small>${n.Date}</small>
<p>${n.Description}</p>

<div class="notice-actions">

<a class="notice-btn view" href="${n.PDF}" target="_blank">📄 Open</a>

<a class="notice-btn download" href="${n.PDF}" download>⬇ Download</a>

</div>

</div>
`).join('');

});

/* PRINT */
function printReport(){
let w=window.open();
w.document.write(`
<h2>Shivraj Hospital Report</h2>
<p>${reportTitle.innerText}</p>
<hr>
<p>OPD: ${opd.innerText}</p>
<p>ER: ${er.innerText}</p>
<p>Lab: ${lab.innerText}</p>
<p>Pharmacy: ${pharmacy.innerText}</p>
<p>Delivery: ${delivery.innerText}</p>
<p>ANC: ${anc.innerText}</p>
<p>ECG: ${ecg.innerText}</p>
<p>USG: ${usg.innerText}</p>
<p>X-Ray: ${xray.innerText}</p>
`);
w.print();
}

</script>

</body>
</html>
