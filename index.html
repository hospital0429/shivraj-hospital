<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shivraj Hospital Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/nepali-date-converter/dist/index.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#eef5ff;}
.header{background:#0d6efd;color:white;text-align:center;padding:15px;font-size:22px;}
.container{padding:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
.card{background:white;padding:12px;border-radius:10px;text-align:center;box-shadow:0 3px 8px rgba(0,0,0,0.1);}
.card h3{margin:0;color:#0d6efd;}
.value{font-size:18px;font-weight:bold;margin-top:5px;}
.section{margin-top:25px;}
input,button{padding:8px;border-radius:6px;border:1px solid #ccc;}
button{background:#0d6efd;color:white;border:none;}
</style>
</head>

<body>

<div class="header">
Shivraj Hospital Dashboard
<div>📅 आजको मिति: <span id="todayBS"></span></div>
<div>🕒 <span id="clock"></span></div>
</div>

<div class="container">

<div style="text-align:center;margin-bottom:10px;">
<input type="date" id="datePicker">
<button onclick="searchData()">Search</button>
</div>

<h3 id="reportTitle"></h3>

<div class="grid">
<div class="card"><h3>OPD</h3><div id="opd" class="value">0</div></div>
<div class="card"><h3>Emergency</h3><div id="er" class="value">0</div></div>
<div class="card"><h3>Lab</h3><div id="lab" class="value">0</div></div>
<div class="card"><h3>Pharmacy</h3><div id="pharmacy" class="value">0</div></div>
<div class="card"><h3>Delivery</h3><div id="delivery" class="value">0</div></div>
<div class="card"><h3>ANC</h3><div id="anc" class="value">0</div></div>
</div>

<div class="section">
<h2>Monthly Graph</h2>
<canvas id="chart"></canvas>
</div>

</div>

<script>

const sheetID="1ssepRWNPq9Jy7vnTGXNT0e6Msnn0CFWW2PACQaq3ojw";
let allData=[];

/* ================= CLOCK ================= */
function updateClock(){
let n=new Date();
let h=n.getHours(),m=n.getMinutes(),s=n.getSeconds();
let p="AM";
if(h>=12)p="PM";
if(h>12)h-=12;
if(h===0)h=12;
document.getElementById("clock").innerText=
(h<10?"0"+h:h)+":"+(m<10?"0"+m:m)+":"+(s<10?"0"+s:s)+" "+p;
}
setInterval(updateClock,1000);updateClock();

/* ================= BS DATE ================= */
function setTodayBS(){
let bs=NepaliDateConverter.ADToBS(new Date());
document.getElementById("todayBS").innerText=
bs.monthName+" "+bs.day+", "+bs.year;
}
setTodayBS();

/* ================= LOAD DAILY ================= */
fetch(`https://opensheet.elk.sh/${sheetID}/DAILY DATA`)
.then(r=>r.json())
.then(d=>{
allData=d||[];
init();
});

/* ================= INIT ================= */
function init(){

let today=new Date();
let y=today.getFullYear();
let m=String(today.getMonth()+1).padStart(2,'0');
let d=String(today.getDate()).padStart(2,'0');

let todayStr=y+"-"+m+"-"+d;

document.getElementById("datePicker").value=todayStr;

searchData(); // load today
}

/* ================= SEARCH ================= */
function searchData(){

let selected=document.getElementById("datePicker").value;

let found=allData.find(row=>{

let dt=new Date(row.Date);
if(isNaN(dt)) return false;

let y=dt.getFullYear();
let m=String(dt.getMonth()+1).padStart(2,'0');
let d=String(dt.getDate()).padStart(2,'0');

let formatted=y+"-"+m+"-"+d;

return formatted===selected;
});

if(found){

show(found);

/* convert AD → BS for title */
let bs=NepaliDateConverter.ADToBS(new Date(selected));

document.getElementById("reportTitle").innerText=
"Report (BS): "+bs.monthName+" "+bs.day+", "+bs.year;

}else{
alert("No data found for selected date");
}
}

/* ================= SHOW ================= */
function show(d){
opd.innerText=(+d["OPD Male"]||0)+(+d["OPD Female"]||0);
er.innerText=(+d["ER Red"]||0)+(+d["ER Yellow"]||0)+(+d["ER Green"]||0);
lab.innerText=d.Lab||0;
pharmacy.innerText=d.Pharmacy||0;
delivery.innerText=d.Delivery||0;
anc.innerText=d.ANC||0;
}

/* ================= MONTHLY GRAPH ================= */
fetch(`https://opensheet.elk.sh/${sheetID}/MONTHLY%20DATA`)
.then(r=>r.json())
.then(d=>{

new Chart(document.getElementById("chart"),{
type:'bar',
data:{
labels:d.map(x=>x.Month),
datasets:[
{label:'OPD',data:d.map(x=>+x.OPD||0),backgroundColor:'#0d6efd'},
{label:'ER',data:d.map(x=>+x.ER||0),backgroundColor:'#dc3545'},
{label:'ANC',data:d.map(x=>+x.ANC||0),backgroundColor:'#198754'},
{label:'Delivery',data:d.map(x=>+x.Delivery||0),backgroundColor:'#ffc107'}
]
}
});

});

</script>

</body>
</html>
