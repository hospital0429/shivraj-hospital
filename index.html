<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shivraj Hospital Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/nepali-date-converter/dist/index.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f0f6ff;}
.header{background:#0d6efd;color:white;text-align:center;padding:15px;font-size:24px;}
.container{padding:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
.card{background:white;padding:12px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);text-align:center;}
.card h3{color:#0d6efd;margin:0;}
.value{font-size:18px;font-weight:bold;margin-top:8px;}
.section{margin-top:25px;}
input,button{padding:8px;border-radius:6px;border:1px solid #ccc;}
button{background:#0d6efd;color:white;border:none;}
</style>
</head>

<body>

<div class="header">
Shivraj Hospital Dashboard
<div>📅 आजको मिति: <span id="todayBS"></span></div>
<div>🕒 <span id="clock"></span></div>
</div>

<div class="container">

<!-- BS DATE INPUT -->
<div style="text-align:center;margin-bottom:10px;">
<input type="date" id="datePicker">
<button onclick="searchBS()">Search (BS)</button>
</div>

<h3 id="reportTitle"></h3>

<div class="grid">
<div class="card"><h3>OPD</h3><div id="opd" class="value">0</div></div>
<div class="card"><h3>Emergency</h3><div id="er" class="value">0</div></div>
<div class="card"><h3>Lab</h3><div id="lab" class="value">0</div></div>
<div class="card"><h3>Pharmacy</h3><div id="pharmacy" class="value">0</div></div>
<div class="card"><h3>Delivery</h3><div id="delivery" class="value">0</div></div>
<div class="card"><h3>ANC</h3><div id="anc" class="value">0</div></div>
</div>

<canvas id="chart"></canvas>

</div>

<script>

const sheetID="1ssepRWNPq9Jy7vnTGXNT0e6Msnn0CFWW2PACQaq3ojw";
let allData=[];

/* ======================
   CLOCK
====================== */
function clock(){
let n=new Date();
let h=n.getHours(),m=n.getMinutes(),s=n.getSeconds();
let p="AM";
if(h>=12)p="PM";
if(h>12)h-=12;
if(h===0)h=12;
clockEl.innerText=(h<10?"0"+h:h)+":"+(m<10?"0"+m:m)+":"+(s<10?"0"+s:s)+" "+p;
}
let clockEl=document.getElementById("clock");
setInterval(clock,1000);clock();

/* ======================
   TODAY BS DATE
====================== */
function getTodayBS(){
let bs=NepaliDateConverter.ADToBS(new Date());
return bs.year+"-"+String(bs.month).padStart(2,'0')+"-"+String(bs.day).padStart(2,'0');
}

function formatBS(){
let bs=NepaliDateConverter.ADToBS(new Date());
return bs.monthName+" "+bs.day+", "+bs.year;
}

document.getElementById("todayBS").innerText=formatBS();

/* ======================
   LOAD DATA
====================== */
fetch(`https://opensheet.elk.sh/${sheetID}/DAILY DATA`)
.then(r=>r.json())
.then(d=>{
allData=d;
init();
});

/* ======================
   INIT
====================== */
function init(){
let todayBS=getTodayBS();
document.getElementById("datePicker").value=convertBSToAD(todayBS);
searchBS();
}

/* ======================
   BS → AD CONVERT
====================== */
function convertBSToAD(bsDate){
let [y,m,d]=bsDate.split("-");
let ad=NepaliDateConverter.BSToAD(y,m,d);
let date=new Date(ad.year,ad.month-1,ad.day);

let yy=date.getFullYear();
let mm=String(date.getMonth()+1).padStart(2,'0');
let dd=String(date.getDate()).padStart(2,'0');

return yy+"-"+mm+"-"+dd;
}

/* ======================
   SEARCH (BS BASED)
====================== */
function searchBS(){

let selectedAD=document.getElementById("datePicker").value;

let found=allData.find(row=>{

let dt=new Date(row.Date);
if(isNaN(dt)) return false;

let y=dt.getFullYear();
let m=String(dt.getMonth()+1).padStart(2,'0');
let d=String(dt.getDate()).padStart(2,'0');

let formatted=y+"-"+m+"-"+d;

return formatted===selectedAD;
});

if(found){
show(found);

let bs=NepaliDateConverter.ADToBS(new Date(selectedAD));
document.getElementById("reportTitle").innerText=
"Report Date (BS): "+bs.monthName+" "+bs.day+", "+bs.year;

}else{
alert("No data found");
}
}

/* ======================
   SHOW DATA
====================== */
function show(d){
opd.innerText=(+d["OPD Male"]||0)+(+d["OPD Female"]||0);
er.innerText=(+d["ER Red"]||0)+(+d["ER Yellow"]||0)+(+d["ER Green"]||0);
lab.innerText=d.Lab||0;
pharmacy.innerText=d.Pharmacy||0;
delivery.innerText=d.Delivery||0;
anc.innerText=d.ANC||0;
}

/* ======================
   GRAPH
====================== */
fetch(`https://opensheet.elk.sh/${sheetID}/MONTHLY%20DATA`)
.then(r=>r.json())
.then(d=>{
new Chart(chart,{
type:'bar',
data:{
labels:d.map(x=>x.Month),
datasets:[
{label:'OPD',data:d.map(x=>+x.OPD||0),backgroundColor:'blue'},
{label:'ER',data:d.map(x=>+x.ER||0),backgroundColor:'red'},
{label:'ANC',data:d.map(x=>+x.ANC||0),backgroundColor:'green'}
]
}
});
});

</script>

</body>
</html>
