<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shivraj Hospital Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#eef5ff;}
.header{background:#0d6efd;color:white;text-align:center;padding:15px;font-size:22px;}
.container{padding:20px;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
.card{background:white;padding:12px;border-radius:10px;text-align:center;box-shadow:0 3px 8px rgba(0,0,0,0.1);}
.card h3{margin:0;color:#0d6efd;}
.value{font-size:18px;font-weight:bold;margin-top:5px;}

.section{margin-top:25px;}

input,button,select{padding:8px;border-radius:6px;border:1px solid #ccc;}
button{background:#0d6efd;color:white;border:none;cursor:pointer;}

.notice-card{background:white;padding:12px;margin-bottom:10px;border-radius:10px;}

.notice-btn{padding:6px 10px;border-radius:6px;text-decoration:none;margin-right:6px;}
.view{background:#0d6efd;color:white;}
.download{background:#28a745;color:white;}

img{width:100%;border-radius:8px;margin-top:5px;}

/* OCCUPANCY */
.occ-green{background:#198754;color:white;padding:6px;border-radius:6px;}
.occ-yellow{background:#ffc107;color:black;padding:6px;border-radius:6px;}
.occ-red{background:#dc3545;color:white;padding:6px;border-radius:6px;}

/* PRINT SYSTEM */
@media print {

body * {
visibility:hidden;
}

#printArea, #printArea * {
visibility:visible;
}

#printArea{
position:absolute;
left:0;
top:0;
width:100%;
}

.no-print{
display:none !important;
}
}
</style>
</head>

<body>

<div class="header no-print">
Shivraj Hospital Dashboard
<div>🕒 <span id="clock"></span></div>
</div>

<div class="container">

<!-- FILTER -->
<div class="no-print" style="text-align:center;">
<input type="date" id="selectedDate">
<button onclick="loadData()">Search</button>
<button onclick="printReport()">Print Report</button>
</div>

<h3 id="reportTitle"></h3>

<!-- PRINT AREA START -->
<div id="printArea">

<div class="grid">

<div class="card"><h3>OPD</h3><div id="opd" class="value">0</div></div>
<div class="card"><h3>Emergency</h3><div id="er" class="value">0</div></div>
<div class="card"><h3>Lab</h3><div id="lab" class="value">0</div></div>
<div class="card"><h3>Pharmacy</h3><div id="pharmacy" class="value">0</div></div>
<div class="card"><h3>Delivery</h3><div id="delivery" class="value">0</div></div>
<div class="card"><h3>ANC</h3><div id="anc" class="value">0</div></div>

<div class="card"><h3>ECG</h3><div id="ecg" class="value">0</div></div>
<div class="card"><h3>USG</h3><div id="usg" class="value">0</div></div>
<div class="card"><h3>X-Ray</h3><div id="xray" class="value">0</div></div>

<div class="card">
<h3>Indoor Services</h3>
<div>Total: <span id="admitted">0</span></div>
<div>Male: <span id="admittedMale">0</span></div>
<div>Female: <span id="admittedFemale">0</span></div>
<div>Discharged: <span id="discharged">0</span></div>
</div>

<div class="card">
<h3>Bed Occupancy</h3>
<div id="occupancy">0%</div>
<div id="occMessage"></div>
</div>

</div>

<!-- FOOTER -->
<div style="margin-top:50px;text-align:right;">
<b>MEDICAL RECORDER</b><br>
____________________
</div>

</div>
<!-- PRINT AREA END -->

<div class="section no-print">
<h2>Monthly Graph</h2>
<canvas id="chart"></canvas>
</div>

<div class="section no-print">
<h2>Bed Occupancy Trend</h2>
<canvas id="occChart"></canvas>
</div>

</div>

<script>

const sheetID="1ssepRWNPq9Jy7vnTGXNT0e6Msnn0CFWW2PACQaq3ojw";
let allData=[];

/* CLOCK */
setInterval(()=>{
let n=new Date();
let h=n.getHours(),m=n.getMinutes(),s=n.getSeconds();
let p="AM";
if(h>=12)p="PM";
if(h>12)h-=12;
if(h===0)h=12;
document.getElementById("clock").innerText=
(h<10?"0"+h:h)+":"+(m<10?"0"+m:m)+":"+(s<10?"0"+s:s)+" "+p;
},1000);

/* LOAD DATA */
fetch(`https://opensheet.elk.sh/${sheetID}/DAILY DATA`)
.then(r=>r.json())
.then(d=>{allData=d||[];init();});

function init(){
let t=new Date();
let y=t.getFullYear();
let m=String(t.getMonth()+1).padStart(2,'0');
let d=String(t.getDate()).padStart(2,'0');
selectedDate.value=y+"-"+m+"-"+d;
loadData();
}

/* SEARCH */
function loadData(){
let sel=selectedDate.value;

let f=allData.find(r=>{
let dt=new Date(r.Date);
if(isNaN(dt)) return false;
let y=dt.getFullYear();
let m=String(dt.getMonth()+1).padStart(2,'0');
let d=String(dt.getDate()).padStart(2,'0');
return (y+"-"+m+"-"+d)===sel;
});

if(f){show(f);reportTitle.innerText="Report: "+sel;}
else alert("No data found");
}

/* SHOW */
function show(d){

opd.innerText=(+d["OPD Male"]||0)+(+d["OPD Female"]||0);
er.innerText=(+d["ER Red"]||0)+(+d["ER Yellow"]||0)+(+d["ER Green"]||0);
lab.innerText=d.Lab||0;
pharmacy.innerText=d.Pharmacy||0;
delivery.innerText=d.Delivery||0;
anc.innerText=d.ANC||0;
ecg.innerText=d.ECG||0;
usg.innerText=d.USG||0;
xray.innerText=d["X-Ray"]||0;

let am=+d["Admitted Male"]||0;
let af=+d["Admitted Female"]||0;

admittedMale.innerText=am;
admittedFemale.innerText=af;
admitted.innerText=am+af;
discharged.innerText=d["Discharged"]||0;

/* OCCUPANCY */
let beds=+d["Total Beds"]||0;
let total=am+af;

let occBox=document.getElementById("occupancy");
let msg=document.getElementById("occMessage");

if(beds){
let occ=(total/beds)*100;
occBox.innerText=occ.toFixed(1)+"%";

occBox.classList.remove("occ-green","occ-yellow","occ-red");

if(occ<=50){occBox.classList.add("occ-green");msg.innerText="Normal";}
else if(occ<=80){occBox.classList.add("occ-yellow");msg.innerText="Filling Fast";}
else{occBox.classList.add("occ-red");msg.innerText="Beds Full";}
}
}

/* PRINT ONLY REPORT */
function printReport(){
window.print();
}

/* GRAPHS */
fetch(`https://opensheet.elk.sh/${sheetID}/MONTHLY%20DATA`)
.then(r=>r.json())
.then(d=>{

new Chart(chart,{
type:'bar',
data:{
labels:d.map(x=>x.Month),
datasets:[
{label:'OPD',data:d.map(x=>+x.OPD||0),backgroundColor:'blue'},
{label:'ER',data:d.map(x=>+x.ER||0),backgroundColor:'red'},
{label:'ANC',data:d.map(x=>+x.ANC||0),backgroundColor:'green'}
]
}
});

/* occupancy trend */
new Chart(occChart,{
type:'line',
data:{
labels:d.map(x=>x.Month),
datasets:[{
label:'Occupancy %',
data:d.map(x=>{
let t=(+x["Admitted Male"]||0)+(+x["Admitted Female"]||0);
let b=+x["Total Beds"]||0;
return b?((t/b)*100).toFixed(1):0;
}),
borderColor:'red'
}]
}
});

});

</script>

</body>
</html>
