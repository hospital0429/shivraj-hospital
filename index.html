<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shivraj Hospital Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:'Segoe UI';background:#f0f6ff;}
.header{background:#0d6efd;color:white;padding:18px;text-align:center;font-size:26px;}
.container{padding:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;}
.card{background:white;padding:15px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
img{width:100%;border-radius:8px;}
.section{margin-top:30px;}
</style>

</head>

<body>

<div class="header">Shivraj Hospital Dashboard</div>

<div class="container">

<!-- GRAPH -->
<div class="section">
<h2>Monthly OPD Trend</h2>
<canvas id="chart"></canvas>
</div>

<!-- DOCTORS -->
<div class="section">
<h2>Doctors</h2>
<div class="grid" id="doctors"></div>
</div>

<!-- STAFF -->
<div class="section">
<h2>Staff Details</h2>
<div class="grid" id="staff"></div>
</div>

<!-- HEADS -->
<div class="section">
<h2>Department Heads</h2>
<div class="grid" id="heads"></div>
</div>

</div>

<script>

const sheetID="1ssepRWNPq9Jy7vnTGXNT0e6Msnn0CFWW2PACQaq3ojw";

// 📊 GRAPH
fetch(`https://opensheet.elk.sh/${sheetID}/MONTHLY DATA`)
.then(res=>res.json())
.then(data=>{

    const labels = data.map(d=>d.Month);
    const opd = data.map(d=>Number(d.OPD||0));

    new Chart(document.getElementById("chart"),{
        type:'line',
        data:{
            labels:labels,
            datasets:[{
                label:'OPD',
                data:opd,
                borderWidth:2
            }]
        }
    });
});

// 👨‍⚕️ DOCTORS
fetch(`https://opensheet.elk.sh/${sheetID}/DOCTORS`)
.then(res=>res.json())
.then(data=>{
    let html="";
    data.forEach(d=>{
        html+=`
        <div class="card">
        <img src="${d.Photo}">
        <h3>${d.Name}</h3>
        <p>${d.Department}</p>
        </div>`;
    });
    document.getElementById("doctors").innerHTML=html;
});

// 👨‍💼 STAFF
fetch(`https://opensheet.elk.sh/${sheetID}/STAFF`)
.then(res=>res.json())
.then(data=>{
    let html="";
    data.forEach(d=>{
        html+=`
        <div class="card">
        <img src="${d.Photo}">
        <h3>${d.Name}</h3>
        <p>${d.Position}</p>
        </div>`;
    });
    document.getElementById("staff").innerHTML=html;
});

// 🏥 HEADS
fetch(`https://opensheet.elk.sh/${sheetID}/HEADS`)
.then(res=>res.json())
.then(data=>{
    let html="";
    data.forEach(d=>{
        html+=`
        <div class="card">
        <img src="${d.Photo}">
        <h3>${d.Name}</h3>
        <p>${d.Department}</p>
        </div>`;
    });
    document.getElementById("heads").innerHTML=html;
});

</script>

</body>
</html>
