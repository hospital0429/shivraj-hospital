<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shivraj Hospital MIS System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#eef5ff;}

.header{
background:#0d6efd;color:white;text-align:center;
padding:15px;font-size:22px;
}

.container{padding:20px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:12px;
}

.card{
background:white;padding:12px;border-radius:10px;
text-align:center;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.section{margin-top:25px;}

input,button,select{
padding:8px;border-radius:6px;border:1px solid #ccc;
}

button{
background:#0d6efd;color:white;border:none;cursor:pointer;
}

.notice-card{
background:white;padding:12px;margin-bottom:10px;border-radius:10px;
}

img{width:100%;border-radius:8px;margin-top:5px;}

.occ-green{background:#198754;color:white;padding:6px;border-radius:6px;}
.occ-yellow{background:#ffc107;color:black;padding:6px;border-radius:6px;}
.occ-red{background:#dc3545;color:white;padding:6px;border-radius:6px;}

/* PRINT ONLY REPORT */
@media print{
body *{visibility:hidden;}
#printArea,#printArea *{visibility:visible;}
#printArea{position:absolute;left:0;top:0;width:100%;}
.no-print{display:none;}
}
</style>
</head>

<body>

<div class="header no-print">
🏥 Shivraj Hospital MIS Dashboard
</div>

<div class="container">

<!-- DAILY FILTER -->
<div class="no-print" style="text-align:center;">
<input type="date" id="selectedDate">
<button onclick="loadDaily()">Search</button>
<button onclick="window.print()">Print</button>
</div>

<!-- RANGE REPORT -->
<div class="no-print" style="text-align:center;margin-top:10px;">
<h3>📊 Range Report</h3>
<input type="date" id="fromDate">
<input type="date" id="toDate">
<button onclick="generateRange()">Generate</button>
</div>

<div id="rangeResult"></div>

<!-- PRINT AREA -->
<div id="printArea">

<h2 style="text-align:center;">SHIVRAJ HOSPITAL</h2>
<h3 id="reportDate" style="text-align:center;"></h3>
<hr>

<div class="grid">

<div class="card">OPD<br><b id="opd">0</b></div>
<div class="card">ER<br><b id="er">0</b></div>
<div class="card">Lab<br><b id="lab">0</b></div>
<div class="card">Pharmacy<br><b id="pharmacy">0</b></div>

<div class="card">ECG<br><b id="ecg">0</b></div>
<div class="card">USG<br><b id="usg">0</b></div>

<div class="card">Indoor<br><b id="indoor">0</b></div>
<div class="card">Occupancy<br><b id="occ">0%</b></div>

</div>

</div>

<!-- GRAPH -->
<div class="section no-print">
<h2>📊 Monthly Graph</h2>
<canvas id="monthlyChart"></canvas>
</div>

<div class="section no-print">
<h2>📈 Occupancy Trend</h2>
<canvas id="trendChart"></canvas>
</div>

<!-- CONSULTANT -->
<div class="section no-print">
<h2>🩺 Monday Consultant Schedule</h2>
<div class="grid" id="consultantBox"></div>
</div>

</div>

<script>

const sheetID="1ssepRWNPq9Jy7vnTGXNT0e6Msnn0CFWW2PACQaq3ojw";

let daily=[], monthly=[], consultant=[];

/* SAFE LOAD */
async function fetchSheet(name){
try{
let r=await fetch(`https://opensheet.elk.sh/${sheetID}/${name}`);
return await r.json();
}catch(e){return [];}
}

/* INIT */
async function init(){

daily = await fetchSheet("DAILY DATA");
monthly = await fetchSheet("MONTHLY DATA");
consultant = await fetchSheet("CONSULTANT_SCHEDULE");

loadDaily();
loadGraphs();
loadConsultant();

selectedDate.value=new Date().toISOString().split("T")[0];
}

init();

/* DAILY */
function loadDaily(){

let sel=selectedDate.value;

let f=daily.find(x=>x.Date && x.Date.split("T")[0]===sel);
if(!f) return;

opd.innerText=(+f["OPD Male"]||0)+(+f["OPD Female"]||0);
er.innerText=(+f["ER Red"]||0)+(+f["ER Yellow"]||0)+(+f["ER Green"]||0);
lab.innerText=f.Lab||0;
pharmacy.innerText=f.Pharmacy||0;
ecg.innerText=f.ECG||0;
usg.innerText=f.USG||0;

let total=(+f["Admitted Male"]||0)+(+f["Admitted Female"]||0);
indoor.innerText=total;

let beds=+f["Total Beds"]||1;
occ.innerText=(total/beds*100).toFixed(1)+"%";

reportDate.innerText="Daily Report - "+sel;
}

/* RANGE REPORT FIXED */
function generateRange(){

let from=new Date(fromDate.value);
let to=new Date(toDate.value);

let filtered=daily.filter(x=>{
let d=new Date(x.Date);
return d>=from && d<=to;
});

let sum={opd:0,er:0,lab:0,pharmacy:0,ecg:0,usg:0,indoor:0};

filtered.forEach(f=>{
sum.opd+=(+f["OPD Male"]||0)+(+f["OPD Female"]||0);
sum.er+=(+f["ER Red"]||0)+(+f["ER Yellow"]||0)+(+f["ER Green"]||0);
sum.lab+=+f.Lab||0;
sum.pharmacy+=+f.Pharmacy||0;
sum.ecg+=+f.ECG||0;
sum.usg+=+f.USG||0;
sum.indoor+=(+f["Admitted Male"]||0)+(+f["Admitted Female"]||0);
});

rangeResult.innerHTML=`
<div class="card">
<h3>📊 RANGE REPORT</h3>
<p>OPD: ${sum.opd}</p>
<p>ER: ${sum.er}</p>
<p>Lab: ${sum.lab}</p>
<p>Pharmacy: ${sum.pharmacy}</p>
<p>ECG: ${sum.ecg}</p>
<p>USG: ${sum.usg}</p>
<p>Indoor: ${sum.indoor}</p>
</div>`;
}

/* GRAPH FIXED */
function loadGraphs(){

new Chart(monthlyChart,{
type:'bar',
data:{
labels:monthly.map(x=>x.Month),
datasets:[
{label:'OPD',data:monthly.map(x=>+x.OPD||0),backgroundColor:'blue'},
{label:'ER',data:monthly.map(x=>+x.ER||0),backgroundColor:'red'},
{label:'Lab',data:monthly.map(x=>+x.Lab||0),backgroundColor:'green'}
]
}
});

new Chart(trendChart,{
type:'line',
data:{
labels:monthly.map(x=>x.Month),
datasets:[{
label:'Occupancy %',
data:monthly.map(x=>{
let t=(+x["Admitted Male"]||0)+(+x["Admitted Female"]||0);
let b=+x["Total Beds"]||1;
return (t/b*100).toFixed(1);
}),
borderColor:'orange'
}]
}
});

}

/* CONSULTANT FIXED */
function loadConsultant(){

let today=new Date();
today.setDate(today.getDate()-today.getDay()+1);
let mon=today.toISOString().split("T")[0];

let list=consultant.filter(x=>x.Date===mon);

consultantBox.innerHTML=list.map(x=>`
<div class="card">
<h3>${x.Department}</h3>
<p>${x.Doctor}</p>
</div>
`).join('');
}

</script>

</body>
</html>
