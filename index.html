<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shivraj Hospital MIS v31.5</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#eef5ff;}

.header{
background:#0d6efd;color:white;text-align:center;
padding:15px;font-size:20px;
}

.container{padding:20px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
}

.card{
background:white;padding:12px;border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
}

.section{margin-top:20px;}

input,button{
padding:8px;border-radius:6px;border:1px solid #ccc;
}

button{background:#0d6efd;color:white;border:none;cursor:pointer;}

.notice-card{
background:white;padding:12px;border-radius:10px;margin-bottom:10px;
}

.doctor-name{color:red;font-weight:bold;}
.staff-name{color:blue;font-weight:bold;}
.staff-post{color:black;font-size:13px;}

.footer{
text-align:right;margin-top:15px;font-weight:bold;
}

@media print{
body *{visibility:hidden;}
#printArea,#printArea *{visibility:visible;}
#printArea{position:absolute;top:0;left:0;width:100%;}
.no-print{display:none;}
.footer{
visibility:visible!important;
position:fixed;
bottom:10px;
right:20px;
}
}
</style>
</head>

<body>

<div class="header no-print">🏥 Shivraj Hospital MIS SYSTEM v31.5</div>

<div class="container">

<!-- FILTER (RESTORED RANGE SECTION HERE) -->
<div class="no-print" style="text-align:center;">
<input type="date" id="date">
<button onclick="loadDaily()">Load Daily</button>
<button onclick="printDaily()">Print</button>

<br><br>

<input type="date" id="from">
<input type="date" id="to">
<button onclick="loadRange()">Range Report</button>
</div>

<!-- PRINT AREA -->
<div id="printArea">

<h2 style="text-align:center;">SHIVRAJ HOSPITAL</h2>
<h3 id="title"></h3>

<hr>

<div class="grid">

<div class="card">OPD<br><b id="opd">0</b></div>
<div class="card">ER<br><b id="er">0</b></div>
<div class="card">Lab<br><b id="lab">0</b></div>
<div class="card">Pharmacy<br><b id="pharmacy">0</b></div>
<div class="card">ECG<br><b id="ecg">0</b></div>
<div class="card">USG<br><b id="usg">0</b></div>
<div class="card">X-Ray<br><b id="xray">0</b></div>

<div class="card">Admitted<br><b id="admitted">0</b></div>
<div class="card">Discharged<br><b id="discharged">0</b></div>
<div class="card">Occupancy<br><b id="occupancy">0%</b></div>

</div>

<div class="footer">MEDICAL RECORDER __________</div>

</div>

<!-- PIE -->
<div class="section no-print">
<h3>👨‍⚕️ OPD Gender Distribution</h3>
<canvas id="opdPie"></canvas>
</div>

<!-- CONSULTANT -->
<div class="section no-print">
<h3>🩺 Consultant Services</h3>
<div class="grid" id="consult"></div>
</div>

<!-- DUTY ROSTER (DATE PICKER MOVED HERE) -->
<div class="section no-print">
<h3>📅 Duty Roster</h3>

<div style="margin-bottom:10px;">
<input type="date" id="rosterDate">
<button onclick="loadRoster()">View</button>
</div>

<div class="grid" id="roster"></div>
</div>

<!-- OTHER MODULES -->
<div class="section no-print">
<h3>👨‍⚕️ Doctors</h3>
<div class="grid" id="doctors"></div>
</div>

<div class="section no-print">
<h3>👩‍⚕️ Staff</h3>
<div class="grid" id="staff"></div>
</div>

<div class="section no-print">
<h3>🏢 Heads</h3>
<div class="grid" id="heads"></div>
</div>

<div class="section no-print">
<h3>📢 Notices</h3>
<div id="notice"></div>
</div>

</div>

<script>

const sheetID="1ssepRWNPq9Jy7vnTGXNT0e6Msnn0CFWW2PACQaq3ojw";

async function get(s){
try{
let r=await fetch(`https://opensheet.elk.sh/${sheetID}/${s}`);
return await r.json();
}catch{return [];}
}

let daily=[];

/* INIT */
async function init(){
daily=await get("DAILY DATA");

let today=new Date().toISOString().split("T")[0];
date.value=today;
rosterDate.value=today;

loadDaily();
loadPeople();
loadNotice();
loadConsult();
loadRoster();
}
init();

/* DAILY */
function loadDaily(){

let d=daily.find(x=>x.Date && x.Date.includes(date.value));
if(!d) return;

setReport(d,"Daily Report - "+date.value);
loadPie(d);
}

/* RANGE REPORT */
function loadRange(){

let f=new Date(from.value);
let t=new Date(to.value);

let arr=daily.filter(x=>{
let d=new Date(x.Date);
return d>=f && d<=t;
});

let s={opd:0,er:0,lab:0,pharmacy:0,xray:0,adm:0,dis:0};

arr.forEach(x=>{
s.opd+=(+x["OPD Male"]||0)+(+x["OPD Female"]||0);
s.er+=(+x["ER Red"]||0)+(+x["ER Yellow"]||0)+(+x["ER Green"]||0);
s.lab+=+x.Lab||0;
s.pharmacy+=+x.Pharmacy||0;
s.xray+=+x["X-Ray"]||0;

s.adm+=(+x["Admitted Male"]||0)+(+x["Admitted Female"]||0);
s.dis+=(+x["Discharged Male"]||0)+(+x["Discharged Female"]||0);
});

setReport({
OPD:s.opd,ER:s.er,Lab:s.lab,Pharmacy:s.pharmacy,
"X-Ray":s.xray,
"Admitted Male":s.adm/2,
"Admitted Female":s.adm/2,
"Discharged Male":s.dis/2,
"Discharged Female":s.dis/2,
"Total Beds":1
},`Range Report (${from.value} to ${to.value})`);
}

/* ROSTER FIXED */
async function loadRoster(){

let r=await get("ROSTER");
let d=rosterDate.value;

let filtered=(r||[]).filter(x=>x.Date===d);

roster.innerHTML=filtered.map(x=>`
<div class="card">
<h3>${x.Doctor||''}</h3>
<p>${x.Department||''}</p>
<p>${x.Shift||''}</p>
</div>
`).join('');
}

/* REPORT */
function setReport(d,titleText){

opd.innerText=(+d["OPD Male"]||0)+(+d["OPD Female"]||0);
er.innerText=d.ER||0;
lab.innerText=d.Lab||0;
pharmacy.innerText=d.Pharmacy||0;
ecg.innerText=d.ECG||0;
usg.innerText=d.USG||0;
xray.innerText=d["X-Ray"]||0;

let adm=(+d["Admitted Male"]||0)+(+d["Admitted Female"]||0);
let dis=(+d["Discharged Male"]||0)+(+d["Discharged Female"]||0);
let beds=+d["Total Beds"]||1;

admitted.innerText=adm;
discharged.innerText=dis;

let occ=(adm/beds)*100;
occupancy.innerText=occ.toFixed(1)+"%";

if(occ<60) occupancy.style.color="green";
else if(occ<85) occupancy.style.color="orange";
else occupancy.style.color="red";

title.innerText=titleText;
}

/* PIE */
function loadPie(d){

let male=+d["OPD Male"]||0;
let female=+d["OPD Female"]||0;

new Chart(opdPie,{
type:'pie',
data:{
labels:[`Male (${male})`,`Female (${female})`],
datasets:[{data:[male,female],backgroundColor:['red','blue']}]
},
options:{animation:{animateScale:true}}
});
}

/* CONSULTANT */
async function loadConsult(){
let c=await get("CONSULTANT");

consult.innerHTML=(c||[]).map(x=>`
<div class="card">
<h3>${x.Department||''}</h3>
<p><b>Ortho:</b> ${x.Ortho||'-'}</p>
<p><b>Gyne:</b> ${x.Gyne||'-'}</p>
<p><b>Psych:</b> ${x.Psychiatric||x.Psych||'-'}</p>
<p><b>ENT:</b> ${x.ENT||'-'}</p>
<p><b>Derma:</b> ${x.Derma||'-'}</p>
<p><b>Pedia:</b> ${x.Pedia||'-'}</p>
</div>
`).join('');
}

/* OTHER MODULES */
async function loadPeople(){

let doc=await get("DOCTORS");
let stf=await get("STAFF");
let hd=await get("HEADS");

doctors.innerHTML=(doc||[]).map(d=>`
<div class="card">
<img src="${d.Photo||''}">
<h3 class="doctor-name">${d.Name||''}</h3>
</div>
`).join('');

staff.innerHTML=(stf||[]).map(s=>`
<div class="card">
<img src="${s.Photo||''}">
<h3 class="staff-name">${s.Name||''}</h3>
<p class="staff-post">${s.Position||''}</p>
</div>
`).join('');

heads.innerHTML=(hd||[]).map(h=>`
<div class="card">
<img src="${h.Photo||''}">
<h3>${h.Name||''}</h3>
</div>
`).join('');
}

/* NOTICE */
async function loadNotice(){
let n=await get("NOTICES");

notice.innerHTML=(n||[]).map(x=>`
<div class="notice-card">
<h3>${x.Title||''}</h3>
<p>${x.Description||''}</p>
<a href="${x.PDF}" target="_blank">Open</a> |
<a href="${x.PDF}" download>Download</a>
</div>
`).join('');
}

</script>

</body>
</html>
