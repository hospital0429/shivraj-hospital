<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shivraj Hospital Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/nepali-date-converter/dist/index.min.js"></script>

<style>
body{margin:0;font-family:'Segoe UI';background:#f0f6ff;}

.header{
background:#0d6efd;
color:white;
padding:15px;
text-align:center;
font-size:24px;
}

.container{padding:20px;}

.dateBox{text-align:center;margin:10px;}

input,button,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#0d6efd;
color:white;
border:none;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
}

.card{
background:white;
padding:12px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card h3{color:#0d6efd;margin:0;font-size:16px;}
.value{font-size:18px;font-weight:bold;margin-top:8px;}

.section{margin-top:25px;}

img{width:100%;border-radius:8px;margin-top:8px;}

.notice-card{
background:white;
padding:12px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.notice-actions{margin-top:8px;display:flex;gap:8px;}

.notice-btn{
padding:6px 10px;
border-radius:6px;
text-decoration:none;
font-size:13px;
}

.view{background:#0d6efd;color:white;}
.download{background:#28a745;color:white;}

</style>

</head>

<body>

<div class="header">
Shivraj Hospital Dashboard

<div style="font-size:13px;margin-top:5px;">
📅 आजको मिति: <span id="nepaliDate"></span>
</div>

<div style="font-size:13px;">
🕒 Time: <span id="clock"></span>
</div>

</div>

<div class="container">

<!-- DATE -->
<div class="dateBox">
<input type="date" id="selectedDate">
<button onclick="loadData()">Search</button>
</div>

<h3 style="text-align:center;color:#0d6efd;" id="reportTitle"></h3>

<!-- DAILY -->
<div class="grid">

<div class="card"><h3>OPD</h3><div class="value" id="opd">0</div></div>
<div class="card"><h3>Emergency</h3><div class="value" id="er">0</div></div>
<div class="card"><h3>Lab</h3><div class="value" id="lab">0</div></div>
<div class="card"><h3>Pharmacy</h3><div class="value" id="pharmacy">0</div></div>
<div class="card"><h3>Delivery</h3><div class="value" id="delivery">0</div></div>
<div class="card"><h3>ANC</h3><div class="value" id="anc">0</div></div>

<div class="card"><h3>ECG</h3><div class="value" id="ecg">0</div></div>
<div class="card"><h3>USG</h3><div class="value" id="usg">0</div></div>
<div class="card"><h3>X-Ray</h3><div class="value" id="xray">0</div></div>

</div>

<!-- MONTHLY -->
<div class="section">
<h2>Monthly Report</h2>

<select id="monthSelect"></select>

<div class="grid">

<div class="card"><h3>OPD</h3><div id="m_opd">0</div></div>
<div class="card"><h3>ER</h3><div id="m_er">0</div></div>
<div class="card"><h3>Delivery</h3><div id="m_delivery">0</div></div>
<div class="card"><h3>ANC</h3><div id="m_anc">0</div></div>
<div class="card"><h3>Lab</h3><div id="m_lab">0</div></div>
<div class="card"><h3>Pharmacy</h3><div id="m_pharmacy">0</div></div>

<div class="card"><h3>ECG</h3><div id="m_ecg">0</div></div>
<div class="card"><h3>USG</h3><div id="m_usg">0</div></div>
<div class="card"><h3>X-Ray</h3><div id="m_xray">0</div></div>

</div>

<canvas id="chart"></canvas>
</div>

<!-- DOCTORS -->
<div class="section">
<h2>Doctors</h2>
<div class="grid" id="doctors"></div>
</div>

<!-- STAFF -->
<div class="section">
<h2>Staff</h2>
<div class="grid" id="staff"></div>
</div>

<!-- HEADS -->
<div class="section">
<h2>Department Heads</h2>
<div class="grid" id="heads"></div>
</div>

<!-- ROSTER -->
<div class="section">
<h2>Duty Roster</h2>
<select id="rosterDate"></select>
<div class="grid" id="rosterList"></div>
</div>

<!-- NOTICES -->
<div class="section">
<h2>Notices</h2>
<div id="notices"></div>
</div>

</div>

<script>

const sheetID="1ssepRWNPq9Jy7vnTGXNT0e6Msnn0CFWW2PACQaq3ojw";

let allData=[], monthlyData=[], rosterData=[];

/* SAFE DATE */
function getBS(){
try{
let bs=NepaliDateConverter.ADToBS(new Date());
return bs.monthName+" "+bs.day+", "+bs.year;
}catch(e){return "--";}
}

document.getElementById("nepaliDate").innerText=getBS();

/* SAFE CLOCK */
function clock(){
try{
let n=new Date();
let h=n.getHours(),m=n.getMinutes(),s=n.getSeconds();
let p="AM";
if(h>=12)p="PM";
if(h>12)h-=12;
if(h===0)h=12;
h=h<10?"0"+h:h;
m=m<10?"0"+m:m;
s=s<10?"0"+s:s;
clock.innerText=h+":"+m+":"+s+" "+p;
}catch(e){
document.getElementById("clock").innerText="--";
}
}
setInterval(clock,1000);clock();

/* DAILY */
fetch(`https://opensheet.elk.sh/${sheetID}/DAILY DATA`)
.then(r=>r.json()).then(d=>{allData=d;loadLatest();});

selectedDate.value=new Date().toISOString().split('T')[0];

function loadLatest(){
if(!allData.length)return;
show(allData[allData.length-1]);
reportTitle.innerText="Latest Data";
}

function loadData(){
let d=allData.find(x=>x.Date);
if(d)show(d);
}

function show(d){
opd.innerText=(+d["OPD Male"]||0)+(+d["OPD Female"]||0);
er.innerText=(+d["ER Red"]||0)+(+d["ER Yellow"]||0)+(+d["ER Green"]||0);
lab.innerText=d.Lab||0;
pharmacy.innerText=d.Pharmacy||0;
delivery.innerText=d.Delivery||0;
anc.innerText=d.ANC||0;
ecg.innerText=d.ECG||0;
usg.innerText=d.USG||0;
xray.innerText=d["X-Ray"]||0;
}

/* MONTHLY */
fetch(`https://opensheet.elk.sh/${sheetID}/MONTHLY%20DATA`)
.then(r=>r.json()).then(d=>{
monthlyData=d||[];
monthSelect.innerHTML="";
d.forEach(x=>{
monthSelect.innerHTML+=`<option>${x.Month}</option>`;
});
loadMonth(d[0]?.Month);
});

function loadMonth(m){
let d=monthlyData.find(x=>x.Month===m);
if(!d)return;
m_opd.innerText=d.OPD||0;
m_er.innerText=d.ER||0;
m_delivery.innerText=d.Delivery||0;
m_anc.innerText=d.ANC||0;
m_lab.innerText=d.Lab||0;
m_pharmacy.innerText=d.Pharmacy||0;
m_ecg.innerText=d.ECG||0;
m_usg.innerText=d.USG||0;
m_xray.innerText=d["X-Ray"]||0;
}
monthSelect.onchange=()=>loadMonth(monthSelect.value);

/* SAFE LOAD */
function load(url,id){
fetch(url).then(r=>r.json()).then(d=>{
document.getElementById(id).innerHTML=(d||[]).map(x=>`
<div class="card">
<img src="${x.Photo||''}" onerror="this.style.display='none'">
<h3>${x.Name||''}</h3>
<p>${x.Department||x.Position||''}</p>
</div>
`).join('');
});
}
load(`https://opensheet.elk.sh/${sheetID}/DOCTORS`,'doctors');
load(`https://opensheet.elk.sh/${sheetID}/STAFF`,'staff');
load(`https://opensheet.elk.sh/${sheetID}/HEADS`,'heads');

/* ROSTER */
fetch(`https://opensheet.elk.sh/${sheetID}/ROSTER`)
.then(r=>r.json()).then(d=>{
rosterData=d||[];
let dates=[...new Set(rosterData.map(x=>x.Date))];
rosterDate.innerHTML="";
dates.forEach(dt=>{
rosterDate.innerHTML+=`<option>${dt}</option>`;
});
loadRoster(dates[0]);
});

function loadRoster(dt){
let f=rosterData.filter(x=>x.Date===dt);
rosterList.innerHTML=f.map(x=>`
<div class="card">
<h3>${x.Doctor}</h3>
<p>${x.Department}</p>
<p>${x.Shift}</p>
</div>
`).join('');
}
rosterDate.onchange=()=>loadRoster(rosterDate.value);

/* NOTICES */
fetch(`https://opensheet.elk.sh/${sheetID}/NOTICES`)
.then(r=>r.json()).then(d=>{
notices.innerHTML=(d||[]).map(n=>`
<div class="notice-card">
<h3>${n.Title}</h3>
<p>${n.Description}</p>
<a class="notice-btn view" href="${n.PDF}" target="_blank">Open</a>
<a class="notice-btn download" href="${n.PDF}" download>Download</a>
</div>
`).join('');
});

</script>

</body>
</html>
