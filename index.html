<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shivraj Hospital MIS v24</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#eef5ff;}

.header{
background:#0d6efd;color:white;text-align:center;
padding:15px;font-size:20px;
}

.container{padding:20px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
}

.card{
background:white;padding:12px;border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
}

.section{margin-top:20px;}

input,button,select{
padding:8px;border-radius:6px;border:1px solid #ccc;
}

button{background:#0d6efd;color:white;border:none;cursor:pointer;}

.notice-card{
background:white;padding:12px;border-radius:10px;margin-bottom:10px;
}

img{width:100%;border-radius:8px;}

/* 🎯 COLOR FIX */
.doctor-name{
color:red;
font-weight:bold;
}

.staff-name{
color:blue;
font-weight:bold;
}

.staff-post{
color:black;
font-size:13px;
}

/* PRINT */
@media print{
body *{visibility:hidden;}
#printArea,#printArea *{visibility:visible;}
#printArea{position:absolute;top:0;left:0;width:100%;}
.no-print{display:none;}
}
</style>
</head>

<body>

<div class="header no-print">🏥 Shivraj Hospital MIS SYSTEM v24</div>

<div class="container">

<!-- FILTER -->
<div class="no-print" style="text-align:center;">
<input type="date" id="date">
<button onclick="loadDaily()">Load</button>
<button onclick="window.print()">Print</button>
</div>

<!-- RANGE -->
<div class="no-print" style="text-align:center;margin-top:10px;">
<input type="date" id="from">
<input type="date" id="to">
<button onclick="rangeReport()">Range Report</button>
</div>

<!-- PRINT AREA -->
<div id="printArea">

<h2 style="text-align:center;">SHIVRAJ HOSPITAL</h2>
<h3 id="title"></h3>

<div id="rangeBox"></div>

<hr>

<div class="grid">

<div class="card">OPD<br><b id="opd">0</b></div>
<div class="card">ER<br><b id="er">0</b></div>
<div class="card">Lab<br><b id="lab">0</b></div>
<div class="card">Pharmacy<br><b id="pharmacy">0</b></div>
<div class="card">ECG<br><b id="ecg">0</b></div>
<div class="card">USG<br><b id="usg">0</b></div>
<div class="card">X-Ray<br><b id="xray">0</b></div>

<div class="card">Admitted<br><b id="admitted">0</b></div>
<div class="card">Discharged<br><b id="discharged">0</b></div>
<div class="card">Occupancy<br><b id="occupancy">0%</b></div>

</div>

<br>
<div style="text-align:right;">MEDICAL RECORDER __________</div>

</div>

<!-- GRAPH -->
<div class="section no-print">
<h3>📊 Monthly Graph</h3>
<canvas id="bar"></canvas>
</div>

<div class="section no-print">
<h3>📈 Occupancy Trend</h3>
<canvas id="line"></canvas>
</div>

<!-- CONSULTANT -->
<div class="section no-print">
<h3>🩺 Consultant (Monday)</h3>
<div class="grid" id="consult"></div>
</div>

<!-- ROSTER -->
<div class="section no-print">
<h3>📅 Duty Roster</h3>
<select id="rosterDate"></select>
<div class="grid" id="roster"></div>
</div>

<!-- DOCTORS -->
<div class="section no-print">
<h3>👨‍⚕️ Doctors</h3>
<div class="grid" id="doctors"></div>
</div>

<!-- STAFF -->
<div class="section no-print">
<h3>👩‍⚕️ Staff</h3>
<div class="grid" id="staff"></div>
</div>

<!-- HEADS -->
<div class="section no-print">
<h3>🏢 Heads</h3>
<div class="grid" id="heads"></div>
</div>

<!-- NOTICE -->
<div class="section no-print">
<h3>📢 Notices</h3>
<div id="notice"></div>
</div>

</div>

<script>

const sheetID="1ssepRWNPq9Jy7vnTGXNT0e6Msnn0CFWW2PACQaq3ojw";

async function get(s){
try{
let r=await fetch(`https://opensheet.elk.sh/${sheetID}/${s}`);
return await r.json();
}catch{return [];}
}

let daily=[], monthly=[], consult=[], rosterData=[], noticeData=[];

/* INIT */
async function init(){

daily=await get("DAILY DATA");
monthly=await get("MONTHLY DATA");
consult=await get("CONSULTANT_SCHEDULE");
rosterData=await get("ROSTER");
noticeData=await get("NOTICES");

date.value=new Date().toISOString().split("T")[0];

loadDaily();
loadGraph();
loadConsult();
loadRoster();
loadNotice();
loadPeople();
}

init();

/* DAILY */
function loadDaily(){

let d=daily.find(x=>x.Date && x.Date.includes(date.value));
if(!d) return;

opd.innerText=(+d["OPD Male"]||0)+(+d["OPD Female"]||0);
er.innerText=(+d["ER Red"]||0)+(+d["ER Yellow"]||0)+(+d["ER Green"]||0);
lab.innerText=d.Lab||0;
pharmacy.innerText=d.Pharmacy||0;
ecg.innerText=d.ECG||0;
usg.innerText=d.USG||0;
xray.innerText=d["X-Ray"]||0;

let adm=(+d["Admitted Male"]||0)+(+d["Admitted Female"]||0);
let dis=(+d["Discharged Male"]||0)+(+d["Discharged Female"]||0);
let beds=+d["Total Beds"]||1;

admitted.innerText=adm;
discharged.innerText=dis;
occupancy.innerText=((adm/beds)*100).toFixed(1)+"%";

title.innerText="Daily Report - "+date.value;
rangeBox.innerHTML="";
}

/* RANGE */
function rangeReport(){

let f=new Date(from.value);
let t=new Date(to.value);

let arr=daily.filter(x=>{
let d=new Date(x.Date);
return d>=f && d<=t;
});

let s={opd:0,er:0,lab:0,pharmacy:0,xray:0,adm:0,dis:0};

arr.forEach(x=>{
s.opd+=(+x["OPD Male"]||0)+(+x["OPD Female"]||0);
s.er+=(+x["ER Red"]||0)+(+x["ER Yellow"]||0)+(+x["ER Green"]||0);
s.lab+=+x.Lab||0;
s.pharmacy+=+x.Pharmacy||0;
s.xray+=+x["X-Ray"]||0;
s.adm+=(+x["Admitted Male"]||0)+(+x["Admitted Female"]||0);
s.dis+=(+x["Discharged Male"]||0)+(+x["Discharged Female"]||0);
});

title.innerText=`Range Report (${from.value} to ${to.value})`;

rangeBox.innerHTML=`
<div class="card">
<p><b>From:</b> ${from.value}</p>
<p><b>To:</b> ${to.value}</p>
<hr>
<p>OPD: ${s.opd}</p>
<p>ER: ${s.er}</p>
<p>Lab: ${s.lab}</p>
<p>X-Ray: ${s.xray}</p>
<p>Admitted: ${s.adm}</p>
<p>Discharged: ${s.dis}</p>
</div>`;
}

/* GRAPH */
function loadGraph(){

new Chart(bar,{
type:'bar',
data:{
labels:monthly.map(x=>x.Month),
datasets:[
{label:'OPD',data:monthly.map(x=>+x.OPD||0),backgroundColor:'blue'},
{label:'ER',data:monthly.map(x=>+x.ER||0),backgroundColor:'red'}
]
}
});

new Chart(line,{
type:'line',
data:{
labels:monthly.map(x=>x.Month),
datasets:[{
label:'Occupancy %',
data:monthly.map(x=>{
let t=(+x["Admitted Male"]||0)+(+x["Admitted Female"]||0);
let b=+x["Total Beds"]||1;
return (t/b*100).toFixed(1);
}),
borderColor:'orange'
}]
}
});

}

/* CONSULTANT */
function loadConsult(){
let today=new Date();
today.setDate(today.getDate()-today.getDay()+1);
let mon=today.toISOString().split("T")[0];

let list=consult.filter(x=>x.Date===mon);

consult.innerHTML=list.map(x=>`
<div class="card">
<h3>${x.Department}</h3>
<p>${x.Doctor}</p>
</div>`).join('');
}

/* ROSTER */
function loadRoster(){

let dates=[...new Set(rosterData.map(x=>x.Date))];
rosterDate.innerHTML=dates.map(d=>`<option>${d}</option>`).join('');
rosterDate.onchange=showRoster;
showRoster();
}

function showRoster(){
let d=rosterDate.value;
let list=rosterData.filter(x=>x.Date===d);

roster.innerHTML=list.map(x=>`
<div class="card">
<h3>${x.Doctor}</h3>
<p>${x.Department}</p>
<p>${x.Shift}</p>
</div>`).join('');
}

/* NOTICE */
function loadNotice(){
notice.innerHTML=noticeData.map(n=>`
<div class="notice-card">
<h3>${n.Title}</h3>
<p>${n.Description}</p>
<a href="${n.PDF}" target="_blank">Open</a> |
<a href="${n.PDF}" download>Download</a>
</div>`).join('');
}

/* PEOPLE */
async function loadPeople(){

let doc=await get("DOCTORS");
let stf=await get("STAFF");
let hd=await get("HEADS");

document.getElementById("doctors").innerHTML=
(doc||[]).map(d=>`
<div class="card">
<img src="${d.Photo||''}">
<h3 class="doctor-name">${d.Name||''}</h3>
</div>`).join('');

document.getElementById("staff").innerHTML=
(stf||[]).map(s=>`
<div class="card">
<img src="${s.Photo||''}">
<h3 class="staff-name">${s.Name||''}</h3>
<p class="staff-post">${s.Position||''}</p>
</div>`).join('');

document.getElementById("heads").innerHTML=
(hd||[]).map(h=>`
<div class="card">
<img src="${h.Photo||''}">
<h3>${h.Name||''}</h3>
</div>`).join('');
}

</script>

</body>
</html>
