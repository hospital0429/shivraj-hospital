<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shivraj Hospital Dashboard</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#f0f6ff;
}

.header {
    background:#0d6efd;
    color:white;
    padding:18px;
    text-align:center;
    font-size:26px;
    font-weight:bold;
}

.container {
    padding:20px;
}

.dateBox {
    text-align:center;
    margin:15px 0;
}

input[type="date"] {
    padding:8px;
    border-radius:6px;
    border:1px solid #ccc;
}

button {
    padding:8px 12px;
    border:none;
    background:#0d6efd;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap:15px;
}

.card {
    background:white;
    padding:18px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h3 {
    margin:0;
    color:#0d6efd;
}

.value {
    font-size:22px;
    margin-top:10px;
    font-weight:bold;
}

.section {
    margin-top:30px;
}

.section h2 {
    color:#0d6efd;
    border-bottom:2px solid #0d6efd;
    padding-bottom:5px;
}

.list {
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.list li {
    padding:8px;
    border-bottom:1px solid #ddd;
}

</style>
</head>

<body>

<div class="header">
Shivraj Hospital Dashboard
</div>

<div class="container">

<!-- DATE SELECT -->
<div class="dateBox">
    <input type="date" id="selectedDate">
    <button onclick="loadData()">Search</button>
</div>

<h3 style="text-align:center;color:#0d6efd;" id="reportTitle"></h3>

<!-- DASHBOARD -->
<div class="grid">

<div class="card">
<h3>OPD Patients</h3>
<div class="value" id="opd">0</div>
</div>

<div class="card">
<h3>Emergency</h3>
<div class="value" id="er">0</div>
</div>

<div class="card">
<h3>Lab</h3>
<div class="value" id="lab">0</div>
</div>

<div class="card">
<h3>Pharmacy</h3>
<div class="value" id="pharmacy">0</div>
</div>

<div class="card">
<h3>Delivery</h3>
<div class="value" id="delivery">0</div>
</div>

<div class="card">
<h3>ANC</h3>
<div class="value" id="anc">0</div>
</div>

</div>

<!-- DOCTORS -->
<div class="section">
<h2>Doctors</h2>
<div class="list">
<ul id="doctors"><li>Loading...</li></ul>
</div>
</div>

<!-- NOTICES -->
<div class="section">
<h2>Notices</h2>
<div class="list">
<ul id="notices"><li>Loading...</li></ul>
</div>
</div>

</div>

<script>

const sheetID = "1ssepRWNPq9Jy7vnTGXNT0e6Msnn0CFWW2PACQaq3ojw";

let allData = [];

// LOAD DATA
fetch(`https://opensheet.elk.sh/${sheetID}/DAILY DATA`)
.then(res => res.json())
.then(data => {

    allData = data;

    loadLatest();

});

// TODAY DATA
function loadLatest() {

    const latest = allData[allData.length - 1];

    showData(latest);

    document.getElementById("reportTitle").innerText =
        "Today Report: " + latest["Date"];
}

// SEARCH BY DATE
function loadData() {

    const date = document.getElementById("selectedDate").value.trim();

    const found = allData.find(d => {

        const sheetDate = (d["Date"] || "").trim();

        return sheetDate === date;
    });

    if(found) {
        showData(found);
        document.getElementById("reportTitle").innerText =
            "Report Date: " + date;
    } else {
        alert("No report found for this date");
    }
}

// SHOW DATA
function showData(d) {

    const male = Number(d["OPD Male"] || 0);
    const female = Number(d["OPD Female"] || 0);

    document.getElementById("opd").innerText =
        male + female + " (M:" + male + " F:" + female + ")";

    document.getElementById("er").innerText =
        "R:" + (d["ER Red"] || 0) +
        " Y:" + (d["ER Yellow"] || 0) +
        " G:" + (d["ER Green"] || 0);

    document.getElementById("lab").innerText = d["Lab"] || 0;
    document.getElementById("pharmacy").innerText = d["Pharmacy"] || 0;
    document.getElementById("delivery").innerText = d["Delivery"] || 0;
    document.getElementById("anc").innerText = d["ANC"] || 0;
}

// DOCTORS
fetch(`https://opensheet.elk.sh/${sheetID}/DOCTORS`)
.then(res => res.json())
.then(data => {

    let html = "";

    data.forEach(d => {
        html += `<li>${d.Name} - ${d.Department}</li>`;
    });

    document.getElementById("doctors").innerHTML = html;

});

// NOTICES
fetch(`https://opensheet.elk.sh/${sheetID}/NOTICES`)
.then(res => res.json())
.then(data => {

    let html = "";

    data.reverse().forEach(n => {
        html += `<li>${n.Date} - ${n.Title}</li>`;
    });

    document.getElementById("notices").innerHTML = html;

});

</script>

</body>
</html>
