<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shivraj Hospital Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:'Segoe UI';background:#f0f6ff;}
.header{background:#0d6efd;color:white;padding:18px;text-align:center;font-size:26px;}
.container{padding:20px;}
.dateBox{text-align:center;margin:15px;}
input,button{padding:8px;border-radius:6px;border:1px solid #ccc;}
button{background:#0d6efd;color:white;border:none;cursor:pointer;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;}
.card{background:white;padding:15px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
.card h3{margin:0;color:#0d6efd;}
.value{font-size:20px;margin-top:10px;font-weight:bold;}
.section{margin-top:30px;}
img{width:100%;border-radius:8px;margin-top:10px;}
</style>

</head>

<body>

<div class="header">Shivraj Hospital Dashboard</div>

<div class="container">

<!-- DATE -->
<div class="dateBox">
<input type="date" id="selectedDate">
<button onclick="loadData()">Search</button>
</div>

<h3 style="text-align:center;color:#0d6efd;" id="reportTitle"></h3>

<!-- DAILY -->
<div class="grid">
<div class="card"><h3>OPD</h3><div class="value" id="opd">0</div></div>
<div class="card"><h3>Emergency</h3><div class="value" id="er">0</div></div>
<div class="card"><h3>Lab</h3><div class="value" id="lab">0</div></div>
<div class="card"><h3>Pharmacy</h3><div class="value" id="pharmacy">0</div></div>
<div class="card"><h3>Delivery</h3><div class="value" id="delivery">0</div></div>
<div class="card"><h3>ANC</h3><div class="value" id="anc">0</div></div>

<div class="card"><h3>ECG</h3><div class="value" id="ecg">0</div></div>
<div class="card"><h3>USG</h3><div class="value" id="usg">0</div></div>
<div class="card"><h3>X-Ray</h3><div class="value" id="xray">0</div></div>
</div>

<!-- MONTHLY -->
<div class="section">
<h2>Monthly Report</h2>
<select id="monthSelect"></select>

<div class="grid">
<div class="card"><h3>OPD</h3><div id="m_opd">0</div></div>
<div class="card"><h3>ER</h3><div id="m_er">0</div></div>
<div class="card"><h3>Delivery</h3><div id="m_delivery">0</div></div>
<div class="card"><h3>ANC</h3><div id="m_anc">0</div></div>
<div class="card"><h3>Lab</h3><div id="m_lab">0</div></div>
<div class="card"><h3>Pharmacy</h3><div id="m_pharmacy">0</div></div>

<div class="card"><h3>ECG</h3><div id="m_ecg">0</div></div>
<div class="card"><h3>USG</h3><div id="m_usg">0</div></div>
<div class="card"><h3>X-Ray</h3><div id="m_xray">0</div></div>
</div>

<canvas id="chart"></canvas>
</div>

<!-- DOCTORS -->
<div class="section">
<h2>Doctors</h2>
<div class="grid" id="doctors"></div>
</div>

<!-- STAFF -->
<div class="section">
<h2>Staff Details</h2>
<div class="grid" id="staff"></div>
</div>

<!-- HEADS -->
<div class="section">
<h2>Department Heads</h2>
<div class="grid" id="heads"></div>
</div>

<!-- NOTICES -->
<div class="section">
<h2>Notices</h2>
<div id="notices"></div>
</div>

</div>

<script>

const sheetID="1ssepRWNPq9Jy7vnTGXNT0e6Msnn0CFWW2PACQaq3ojw";
let allData=[], monthlyData=[];

// DAILY
fetch(`https://opensheet.elk.sh/${sheetID}/DAILY DATA`)
.then(res=>res.json())
.then(data=>{
    allData=data;
    loadLatest();
});

document.getElementById("selectedDate").value=
new Date().toISOString().split('T')[0];

function loadLatest(){
    const d=allData[allData.length-1];
    showData(d);
    document.getElementById("reportTitle").innerText="Today: "+d["Date"];
}

function loadData(){
    const date=document.getElementById("selectedDate").value;

    const found=allData.find(d=>{
        const dt=new Date(d["Date"]);
        if(isNaN(dt)) return false;
        const f=dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,'0')+"-"+String(dt.getDate()).padStart(2,'0');
        return f===date;
    });

    if(found){
        showData(found);
        document.getElementById("reportTitle").innerText="Date: "+date;
    } else alert("No report found");
}

function showData(d){
    const m=Number(d["OPD Male"]||0), f=Number(d["OPD Female"]||0);
    document.getElementById("opd").innerText=m+f+" (M:"+m+" F:"+f+")";

    const r=+d["ER Red"]||0, y=+d["ER Yellow"]||0, g=+d["ER Green"]||0;
    document.getElementById("er").innerText=(r+y+g)+" (R:"+r+" Y:"+y+" G:"+g+")";

    document.getElementById("lab").innerText=d["Lab"]||0;
    document.getElementById("pharmacy").innerText=d["Pharmacy"]||0;
    document.getElementById("delivery").innerText=d["Delivery"]||0;
    document.getElementById("anc").innerText=d["ANC"]||0;

    document.getElementById("ecg").innerText=d["ECG"]||0;
    document.getElementById("usg").innerText=d["USG"]||0;
    document.getElementById("xray").innerText=d["X-Ray"]||0;
}

// MONTHLY
fetch(`https://opensheet.elk.sh/${sheetID}/MONTHLY DATA`)
.then(res=>res.json())
.then(data=>{
    monthlyData=data;

    let s=document.getElementById("monthSelect");
    data.forEach(d=>s.innerHTML+=`<option>${d.Month}</option>`);

    if(data.length>0) loadMonth(data[data.length-1].Month);

    // GRAPH
    new Chart(document.getElementById("chart"),{
        type:'line',
        data:{
            labels:data.map(d=>d.Month),
            datasets:[{label:'OPD',data:data.map(d=>+d.OPD||0),borderWidth:2}]
        }
    });
});

function loadMonth(m){
    const d=monthlyData.find(x=>x.Month===m);
    if(!d) return;

    m_opd.innerText=d.OPD||0;
    m_er.innerText=d.ER||0;
    m_delivery.innerText=d.Delivery||0;
    m_anc.innerText=d.ANC||0;
    m_lab.innerText=d.Lab||0;
    m_pharmacy.innerText=d.Pharmacy||0;
    m_ecg.innerText=d.ECG||0;
    m_usg.innerText=d.USG||0;
    m_xray.innerText=d["X-Ray"]||0;
}

monthSelect.onchange=function(){loadMonth(this.value)};

// DOCTORS
fetch(`https://opensheet.elk.sh/${sheetID}/DOCTORS`)
.then(r=>r.json()).then(d=>{
    doctors.innerHTML=d.map(x=>`
    <div class="card">
    <img src="${x.Photo}">
    <h3>${x.Name}</h3>
    <p>${x.Department}</p>
    </div>`).join('');
});

// STAFF
fetch(`https://opensheet.elk.sh/${sheetID}/STAFF`)
.then(r=>r.json()).then(d=>{
    staff.innerHTML=d.map(x=>`
    <div class="card">
    <img src="${x.Photo}">
    <h3>${x.Name}</h3>
    <p>${x.Position}</p>
    </div>`).join('');
});

// HEADS
fetch(`https://opensheet.elk.sh/${sheetID}/HEADS`)
.then(r=>r.json()).then(d=>{
    heads.innerHTML=d.map(x=>`
    <div class="card">
    <img src="${x.Photo}">
    <h3>${x.Name}</h3>
    <p>${x.Department}</p>
    </div>`).join('');
});

// NOTICES
fetch(`https://opensheet.elk.sh/${sheetID}/NOTICES`)
.then(r=>r.json()).then(d=>{
    notices.innerHTML=d.reverse().map(n=>`
    <div class="card">
    <h3>${n.Title}</h3>
    <p>${n.Description}</p>
    <small>${n.Date}</small>
    ${n.Image?`<img src="${n.Image}">`:""}
    </div>`).join('');
});

</script>

</body>
</html>
